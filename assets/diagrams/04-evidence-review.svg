<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-labelledby="title desc">
  <title id="title">Evidence review state diagram</title>
  <desc id="desc">A state diagram for promoting evidence from draft to checked, reviewed, and quote ready.</desc>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto"><path d="M2 2 L12 7 L2 12 Z" fill="#111"/></marker>
    <style>.h{font:800 42px Inter,PingFang SC,Arial,sans-serif;fill:#111}.s{font:500 20px Inter,PingFang SC,Arial,sans-serif;fill:#8a8a8a}.t{font:850 32px Inter,PingFang SC,Arial,sans-serif;fill:#111}.b{font:500 21px Inter,PingFang SC,Arial,sans-serif;fill:#666}.mono{font:700 20px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#fff}.code{font:800 24px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#111}</style>
  </defs>
  <rect width="1080" height="1920" fill="#f8f8f6"/>
  <g transform="translate(72 72)"><rect width="62" height="62" rx="12" fill="#111"/><text x="31" y="40" text-anchor="middle" class="mono">04</text><text x="86" y="43" class="h">证据审查 · State</text><text x="0" y="104" class="s">自动化切片只能用于浏览，引用必须经过逐级审查。</text></g>
  <g transform="translate(150 250)">
    <rect width="780" height="168" rx="26" fill="#fff" stroke="#e5e5e5"/>
    <circle cx="58" cy="84" r="18" fill="#dc2828"/>
    <text x="98" y="76" class="code">draft</text>
    <text x="98" y="114" class="b">自动生成，尚未人工核对</text>
  </g>
  <path d="M540 438 L540 536" stroke="#111" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="566" y="500" class="s">verify source text</text>
  <g transform="translate(150 556)">
    <rect width="780" height="168" rx="26" fill="#fff" stroke="#e5e5e5"/>
    <circle cx="58" cy="84" r="18" fill="#2c8735"/>
    <text x="98" y="76" class="code">checked</text>
    <text x="98" y="114" class="b">原文或 OCR 与原始页面一致</text>
  </g>
  <path d="M540 744 L540 842" stroke="#111" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="566" y="806" class="s">review translation</text>
  <g transform="translate(150 862)">
    <rect width="780" height="168" rx="26" fill="#fff" stroke="#e5e5e5"/>
    <circle cx="58" cy="84" r="18" fill="#e6ad13"/>
    <text x="98" y="76" class="code">reviewed</text>
    <text x="98" y="114" class="b">工作语言层准确；可安全转述和综合</text>
  </g>
  <path d="M540 1050 L540 1148" stroke="#111" stroke-width="4" marker-end="url(#arrow)"/>
  <text x="566" y="1112" class="s">confirm citekey + page</text>
  <g transform="translate(150 1168)">
    <rect width="780" height="188" rx="26" fill="#111"/>
    <circle cx="58" cy="94" r="18" fill="#fff"/>
    <text x="98" y="84" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="24" font-weight="800" fill="#fff">quote_ready</text>
    <text x="98" y="124" class="b" fill="#d8d8d8">可直接引用；页码、citekey、原文与译文均确认</text>
  </g>
  <g transform="translate(96 1454)">
    <rect width="888" height="244" rx="28" fill="#fff" stroke="#e5e5e5"/>
    <text x="44" y="64" class="t">Evidence Matrix</text>
    <line x1="44" y1="92" x2="844" y2="92" stroke="#ececec"/>
    <text x="44" y="132" class="b">Slice ID · Chapter · Section · Role · Status · Notes</text>
    <text x="44" y="172" class="b">把论点和证据关系显式化，写作前即可检查。</text>
  </g>
  <text x="540" y="1770" text-anchor="middle" class="s">Level 2 supports paraphrase · Level 3 supports direct citation</text>
</svg>
