<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-labelledby="title desc">
  <title id="title">Scholay Skills workflow overview</title>
  <desc id="desc">A 9:16 overview diagram showing the Scholay research workflow from literature discovery to research writing.</desc>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M2 2 L12 7 L2 12 Z" fill="#111111"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#111111" flood-opacity="0.08"/>
    </filter>
    <style>
      .label{font:600 26px Inter,PingFang SC,Arial,sans-serif;fill:#111}
      .small{font:500 20px Inter,PingFang SC,Arial,sans-serif;fill:#777}
      .tiny{font:500 17px Inter,PingFang SC,Arial,sans-serif;fill:#9a9a9a}
      .chip{font:700 17px Inter,PingFang SC,Arial,sans-serif;fill:#222}
      .mono{font:700 20px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#111}
      .word{font:700 66px Georgia,Times New Roman,serif}
    </style>
  </defs>
  <rect width="1080" height="1920" fill="#f7f7f5"/>
  <g transform="translate(72 72)">
    <rect width="62" height="62" rx="12" fill="#111"/>
    <text x="31" y="40" text-anchor="middle" class="mono" fill="#fff">00</text>
    <text x="86" y="43" font-family="Inter,PingFang SC,Arial,sans-serif" font-size="42" font-weight="800" fill="#111">论文工作流 · 总览</text>
    <text x="0" y="104" class="small">从发现文献到写成论文：每一步都保留来源、状态和证据链。</text>
  </g>
  <g transform="translate(72 226)" filter="url(#softShadow)">
    <rect width="936" height="220" rx="28" fill="#111"/>
    <text x="82" y="122" class="word">
      <tspan fill="#dc2828">S</tspan><tspan fill="#2c8735">c</tspan><tspan fill="#e6ad13">h</tspan><tspan fill="#f5f5f5">o</tspan><tspan fill="#dc2828">l</tspan><tspan fill="#2c8735">a</tspan><tspan fill="#e6ad13">y</tspan>
    </text>
    <text x="82" y="166" class="tiny" fill="#8a8a8a">skills as a research evidence system</text>
  </g>
  <g transform="translate(96 518)">
    <g>
      <rect width="888" height="156" rx="24" fill="#fff" stroke="#e5e5e5"/>
      <circle cx="54" cy="78" r="18" fill="#dc2828"/>
      <text x="92" y="66" class="label">Literature Discovery</text>
      <text x="92" y="102" class="small">检索矩阵 → 种子文献 → 三向扩展 → keep 队列</text>
    </g>
    <path d="M444 692 L444 742" stroke="#111" stroke-width="4" marker-end="url(#arrow)"/>
  </g>
  <g transform="translate(96 752)">
    <rect width="888" height="156" rx="24" fill="#fff" stroke="#e5e5e5"/>
    <circle cx="54" cy="78" r="18" fill="#2c8735"/>
    <text x="92" y="66" class="label">Source Intake</text>
    <text x="92" y="102" class="small">原始材料 → 解压登记 → 去重分类 → RAW/SRC ID</text>
  </g>
  <path d="M540 928 L540 978" stroke="#111" stroke-width="4" marker-end="url(#arrow)"/>
  <g transform="translate(96 988)">
    <rect width="888" height="156" rx="24" fill="#fff" stroke="#e5e5e5"/>
    <circle cx="54" cy="78" r="18" fill="#e6ad13"/>
    <text x="92" y="66" class="label">Corpus Building</text>
    <text x="92" y="102" class="small">来源卡 → OCR/图像切片 → 质量评分 → 可追踪语料</text>
  </g>
  <path d="M540 1164 L540 1214" stroke="#111" stroke-width="4" marker-end="url(#arrow)"/>
  <g transform="translate(96 1224)">
    <rect width="888" height="156" rx="24" fill="#fff" stroke="#e5e5e5"/>
    <circle cx="54" cy="78" r="18" fill="#111"/>
    <text x="92" y="66" class="label">Evidence Review</text>
    <text x="92" y="102" class="small">draft → checked → reviewed → quote_ready</text>
  </g>
  <path d="M540 1400 L540 1450" stroke="#111" stroke-width="4" marker-end="url(#arrow)"/>
  <g transform="translate(96 1460)">
    <rect width="888" height="156" rx="24" fill="#fff" stroke="#e5e5e5"/>
    <circle cx="54" cy="78" r="18" fill="#dc2828"/>
    <text x="92" y="66" class="label">Research Writing</text>
    <text x="92" y="102" class="small">证据矩阵 → 章节论证 → 引用完整性 → 输出文稿</text>
  </g>
  <g transform="translate(94 1690)">
    <rect width="214" height="48" rx="24" fill="#fff" stroke="#e7e7e7"/>
    <circle cx="26" cy="24" r="10" fill="#dc2828"/><text x="46" y="31" class="chip">发现</text>
    <rect x="232" width="214" height="48" rx="24" fill="#fff" stroke="#e7e7e7"/>
    <circle cx="258" cy="24" r="10" fill="#2c8735"/><text x="278" y="31" class="chip">登记</text>
    <rect x="464" width="214" height="48" rx="24" fill="#fff" stroke="#e7e7e7"/>
    <circle cx="490" cy="24" r="10" fill="#e6ad13"/><text x="510" y="31" class="chip">切片</text>
    <rect x="696" width="214" height="48" rx="24" fill="#fff" stroke="#e7e7e7"/>
    <circle cx="722" cy="24" r="10" fill="#111"/><text x="742" y="31" class="chip">引用</text>
  </g>
</svg>
