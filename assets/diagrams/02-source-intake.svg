<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-labelledby="title desc">
  <title id="title">Source intake flowchart</title>
  <desc id="desc">A flowchart for registering raw research materials before processing them.</desc>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto"><path d="M2 2 L12 7 L2 12 Z" fill="#111"/></marker>
    <style>.h{font:800 42px Inter,PingFang SC,Arial,sans-serif;fill:#111}.s{font:500 20px Inter,PingFang SC,Arial,sans-serif;fill:#888}.t{font:750 29px Inter,PingFang SC,Arial,sans-serif;fill:#111}.b{font:500 20px Inter,PingFang SC,Arial,sans-serif;fill:#666}.mono{font:700 20px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#fff}.id{font:800 22px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#111}</style>
  </defs>
  <rect width="1080" height="1920" fill="#f8f8f6"/>
  <g transform="translate(72 72)"><rect width="62" height="62" rx="12" fill="#111"/><text x="31" y="40" text-anchor="middle" class="mono">02</text><text x="86" y="43" class="h">资料接收 · Flowchart</text><text x="0" y="104" class="s">先解压、分类、去重、登记，再进入任何 OCR 或抽取流程。</text></g>
  <g transform="translate(126 244)">
    <rect width="828" height="156" rx="24" fill="#fff" stroke="#e5e5e5"/>
    <circle cx="52" cy="78" r="18" fill="#dc2828"/><text x="90" y="66" class="t">Raw Inventory</text><text x="90" y="104" class="b">记录来源和路径，不改名、不移动原始层</text>
  </g>
  <path d="M540 418 L540 492" stroke="#111" stroke-width="4" marker-end="url(#arrow)"/>
  <g transform="translate(126 506)">
    <rect width="828" height="156" rx="24" fill="#fff" stroke="#e5e5e5"/>
    <circle cx="52" cy="78" r="18" fill="#2c8735"/><text x="90" y="66" class="t">Archive First</text><text x="90" y="104" class="b">所有 ZIP/RAR 先展开；记录 parent raw ID</text>
  </g>
  <path d="M540 680 L540 754" stroke="#111" stroke-width="4" marker-end="url(#arrow)"/>
  <g transform="translate(126 768)">
    <rect width="828" height="196" rx="24" fill="#fff" stroke="#e5e5e5"/>
    <circle cx="52" cy="72" r="18" fill="#e6ad13"/><text x="90" y="60" class="t">Classify Object</text>
    <text x="90" y="100" class="b">source_pdf / image_group / dataset / reference_file</text>
    <text x="90" y="136" class="b">archive / derived_pdf / ambiguous</text>
  </g>
  <path d="M540 982 L540 1056" stroke="#111" stroke-width="4" marker-end="url(#arrow)"/>
  <g transform="translate(126 1070)">
    <rect width="828" height="180" rx="24" fill="#fff" stroke="#e5e5e5"/>
    <circle cx="52" cy="72" r="18" fill="#111"/><text x="90" y="60" class="t">Deduplicate</text>
    <text x="90" y="100" class="b">DOI / URL → title + year → manual review</text>
    <text x="90" y="136" class="b">唯一后才允许分配稳定 ID</text>
  </g>
  <path d="M540 1268 L540 1342" stroke="#111" stroke-width="4" marker-end="url(#arrow)"/>
  <g transform="translate(126 1356)">
    <rect width="828" height="188" rx="24" fill="#111"/>
    <text x="72" y="76" class="t" fill="#fff">Stable IDs</text>
    <text x="72" y="124" class="id" fill="#fff">RAW-####  →  SRC-####</text>
    <text x="72" y="162" class="s" fill="#999">raw → normalized → derivative chain</text>
  </g>
  <g transform="translate(122 1644)">
    <rect width="222" height="56" rx="28" fill="#fff" stroke="#e6e6e6"/><circle cx="30" cy="28" r="10" fill="#dc2828"/><text x="52" y="36" class="b">expanded_inventory</text>
    <rect x="244" width="250" height="56" rx="28" fill="#fff" stroke="#e6e6e6"/><circle cx="274" cy="28" r="10" fill="#2c8735"/><text x="296" y="36" class="b">pending_pdf_candidates</text>
    <rect x="516" width="318" height="56" rx="28" fill="#fff" stroke="#e6e6e6"/><circle cx="546" cy="28" r="10" fill="#e6ad13"/><text x="568" y="36" class="b">pending_image_groups</text>
  </g>
</svg>
