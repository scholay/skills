<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920" role="img" aria-labelledby="title desc">
  <title id="title">Literature discovery mind map</title>
  <desc id="desc">A Scholay literature discovery mind map for scope, search matrix, seed set, expansion, candidate list, and gap audit.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#111"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#111" flood-opacity=".07"/></filter>
    <style>
      .h{font:800 42px Inter,PingFang SC,Arial,sans-serif;fill:#111}.s{font:500 20px Inter,PingFang SC,Arial,sans-serif;fill:#8b8b8b}
      .t{font:750 28px Inter,PingFang SC,Arial,sans-serif;fill:#111}.b{font:500 19px Inter,PingFang SC,Arial,sans-serif;fill:#666}
      .mono{font:700 20px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#fff}
    </style>
  </defs>
  <rect width="1080" height="1920" fill="#fafafa"/>
  <g transform="translate(72 72)">
    <rect width="62" height="62" rx="12" fill="#111"/><text x="31" y="40" text-anchor="middle" class="mono">01</text>
    <text x="86" y="43" class="h">文献发现 · Mind Map</text>
    <text x="0" y="104" class="s">先确定研究边界，再以种子文献为中心扩展，不直接下载一堆结果。</text>
  </g>
  <g transform="translate(318 308)" filter="url(#shadow)">
    <circle cx="222" cy="222" r="164" fill="#111"/>
    <text x="222" y="204" text-anchor="middle" font-family="Inter,PingFang SC,Arial,sans-serif" font-size="34" font-weight="850" fill="#fff">Literature</text>
    <text x="222" y="248" text-anchor="middle" font-family="Inter,PingFang SC,Arial,sans-serif" font-size="34" font-weight="850" fill="#fff">Discovery</text>
    <text x="222" y="292" text-anchor="middle" class="s" fill="#aaa">keep queue</text>
  </g>
  <g stroke="#111" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M540 530 C350 555 258 660 224 782"/>
    <path d="M540 530 C730 555 822 660 856 782"/>
    <path d="M540 530 C352 795 250 1010 210 1236"/>
    <path d="M540 530 C728 795 830 1010 870 1236"/>
    <path d="M540 530 C470 1080 450 1290 350 1518"/>
    <path d="M540 530 C610 1080 630 1290 730 1518"/>
  </g>
  <g transform="translate(84 744)">
    <rect width="338" height="196" rx="24" fill="#fff" stroke="#e6e6e6"/>
    <circle cx="44" cy="50" r="14" fill="#dc2828"/><text x="72" y="59" class="t">Scope</text>
    <text x="44" y="106" class="b">一句话界定研究对象</text><text x="44" y="138" class="b">明确不研究什么</text>
  </g>
  <g transform="translate(658 744)">
    <rect width="338" height="196" rx="24" fill="#fff" stroke="#e6e6e6"/>
    <circle cx="44" cy="50" r="14" fill="#2c8735"/><text x="72" y="59" class="t">Matrix</text>
    <text x="44" y="106" class="b">主题、区域、对象</text><text x="44" y="138" class="b">年代、语言、方法</text>
  </g>
  <g transform="translate(84 1166)">
    <rect width="338" height="212" rx="24" fill="#fff" stroke="#e6e6e6"/>
    <circle cx="44" cy="50" r="14" fill="#e6ad13"/><text x="72" y="59" class="t">Seed Set</text>
    <text x="44" y="106" class="b">3-5 个强种子</text><text x="44" y="138" class="b">综述、专著、案例</text><text x="44" y="170" class="b">方法论文</text>
  </g>
  <g transform="translate(658 1166)">
    <rect width="338" height="212" rx="24" fill="#fff" stroke="#e6e6e6"/>
    <circle cx="44" cy="50" r="14" fill="#111"/><text x="72" y="59" class="t">Expand</text>
    <text x="44" y="106" class="b">Backward 引文回溯</text><text x="44" y="138" class="b">Forward 后续引用</text><text x="44" y="170" class="b">Lateral 邻近缺口</text>
  </g>
  <g transform="translate(84 1508)">
    <rect width="338" height="212" rx="24" fill="#fff" stroke="#e6e6e6"/>
    <circle cx="44" cy="50" r="14" fill="#dc2828"/><text x="72" y="59" class="t">Candidate List</text>
    <text x="44" y="106" class="b">title / author / year</text><text x="44" y="138" class="b">status + one-line reason</text><text x="44" y="170" class="b">先记录，后深读</text>
  </g>
  <g transform="translate(658 1508)">
    <rect width="338" height="212" rx="24" fill="#fff" stroke="#e6e6e6"/>
    <circle cx="44" cy="50" r="14" fill="#2c8735"/><text x="72" y="59" class="t">Gap Audit</text>
    <text x="44" y="106" class="b">语言、区域、年代偏差</text><text x="44" y="138" class="b">灰色文献与非英语材料</text><text x="44" y="170" class="b">只提升 keep 项</text>
  </g>
</svg>
