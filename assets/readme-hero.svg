<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Scholay Skills</title>
  <desc id="desc">A clean Scholay Skills banner that adapts to light and dark system themes.</desc>
  <style>
    text {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
    }
    .wordmark {
      font-family: "Playfair Display", Georgia, "Times New Roman", serif;
      font-weight: 700;
    }
    .badge-text {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-weight: 800;
    }
    .page-fill { fill: #ffffff; }
    .panel-fill { fill: #ffffff; }
    .panel-soft-fill { fill: #fafafa; }
    .text-fill { fill: #111111; }
    .muted-fill { fill: #a6a6a6; }
    .subtle-fill { fill: #b8b8b8; }
    .word-o-fill { fill: #111111; }
    .border-stroke { stroke: #e8e8e8; }
    .red-fill { fill: #d92828; }
    .green-fill { fill: #2f8738; }
    .yellow-fill { fill: #e3aa14; }

    @media (prefers-color-scheme: dark) {
      .page-fill { fill: #111111; }
      .panel-fill { fill: #111111; }
      .panel-soft-fill { fill: #171717; }
      .text-fill { fill: #f5f5f5; }
      .muted-fill { fill: #777777; }
      .subtle-fill { fill: #666666; }
      .word-o-fill { fill: #f5f5f5; }
      .border-stroke { stroke: #2a2a2a; }
    }
  </style>

  <rect class="page-fill" width="1280" height="420"/>
  <rect class="border-stroke" x="1" y="1" width="1278" height="418"/>

  <g transform="translate(72 52)">
    <rect class="text-fill" x="0" y="0" width="50" height="50" rx="8"/>
    <text class="badge-text page-fill" x="25" y="33" text-anchor="middle" font-size="22">00</text>
    <text class="text-fill" x="74" y="34" font-size="34" font-weight="850">Scholay Skills</text>
    <text class="muted-fill" x="0" y="82" font-size="17" font-weight="500">
      Open academic AI skills for literature discovery, source intake, corpus building, evidence review, and research writing.
    </text>
  </g>

  <g transform="translate(72 150)">
    <rect class="panel-fill border-stroke" x="0" y="0" width="1136" height="174" rx="12"/>
    <text class="wordmark" x="66" y="108" font-size="92">
      <tspan class="red-fill">S</tspan><tspan class="green-fill">c</tspan><tspan class="yellow-fill">h</tspan><tspan class="word-o-fill">o</tspan><tspan class="red-fill">l</tspan><tspan class="green-fill">a</tspan><tspan class="yellow-fill">y</tspan>
    </text>
    <text class="subtle-fill" x="70" y="142" font-size="13" font-weight="700">Theme-aware wordmark · open skill repository</text>

    <g transform="translate(660 44)">
      <text class="text-fill" x="0" y="24" font-size="24" font-weight="850">Evidence-first research workflows</text>
      <text class="muted-fill" x="0" y="60" font-size="16" font-weight="500">Root-level skills for discovery, intake, corpus, review, and writing.</text>
      <rect class="panel-soft-fill border-stroke" x="0" y="82" width="84" height="26" rx="13"/>
      <circle class="red-fill" cx="16" cy="95" r="6"/>
      <text class="text-fill" x="30" y="100" font-size="12" font-weight="750">open</text>
      <rect class="panel-soft-fill border-stroke" x="100" y="82" width="104" height="26" rx="13"/>
      <circle class="green-fill" cx="116" cy="95" r="6"/>
      <text class="text-fill" x="130" y="100" font-size="12" font-weight="750">traceable</text>
      <rect class="panel-soft-fill border-stroke" x="220" y="82" width="106" height="26" rx="13"/>
      <circle class="yellow-fill" cx="236" cy="95" r="6"/>
      <text class="text-fill" x="250" y="100" font-size="12" font-weight="750">verified</text>
    </g>
  </g>

  <g transform="translate(72 348)">
    <rect class="panel-soft-fill" x="0" y="0" width="1136" height="48" rx="8"/>

    <g transform="translate(20 10)">
      <rect class="panel-fill border-stroke" x="0" y="0" width="182" height="28" rx="14"/>
      <circle class="red-fill" cx="16" cy="14" r="7"/>
      <text class="text-fill" x="31" y="19" font-size="13" font-weight="750">literature-discovery</text>
    </g>

    <g transform="translate(220 10)">
      <rect class="panel-fill border-stroke" x="0" y="0" width="142" height="28" rx="14"/>
      <circle class="green-fill" cx="16" cy="14" r="7"/>
      <text class="text-fill" x="31" y="19" font-size="13" font-weight="750">source-intake</text>
    </g>

    <g transform="translate(380 10)">
      <rect class="panel-fill border-stroke" x="0" y="0" width="158" height="28" rx="14"/>
      <circle class="yellow-fill" cx="16" cy="14" r="7"/>
      <text class="text-fill" x="31" y="19" font-size="13" font-weight="750">corpus-building</text>
    </g>

    <g transform="translate(556 10)">
      <rect class="panel-fill border-stroke" x="0" y="0" width="154" height="28" rx="14"/>
      <circle class="text-fill" cx="16" cy="14" r="7"/>
      <text class="text-fill" x="31" y="19" font-size="13" font-weight="750">evidence-review</text>
    </g>

    <g transform="translate(728 10)">
      <rect class="panel-fill border-stroke" x="0" y="0" width="154" height="28" rx="14"/>
      <circle class="red-fill" cx="16" cy="14" r="7"/>
      <text class="text-fill" x="31" y="19" font-size="13" font-weight="750">research-writing</text>
    </g>

    <g transform="translate(900 10)">
      <rect class="panel-fill border-stroke" x="0" y="0" width="178" height="28" rx="14"/>
      <circle class="green-fill" cx="16" cy="14" r="7"/>
      <text class="text-fill" x="31" y="19" font-size="13" font-weight="750">root-level skills</text>
    </g>
  </g>
</svg>
